- type: replace
  path: /disk_types/name=logsearch_es_data/disk_size
  value: 400_000
- type: replace
  path: /disk_types/name=logsearch_es_platform_data/disk_size
  value: 300_000
- type: replace
  path: /disk_types/name=logs_opensearch_os_data/disk_size
  value: 400_000
- type: replace
  path: /disk_types/name=logs_opensearch_os_old_data/disk_size
  value: 400_000
- type: replace
  path: /disk_types/name=logs_opensearch_os_platform_data/disk_size
  value: 300_000

- type: replace
  path: /vm_extensions/-
  value:
    name: platform-opensearch-lb
    cloud_properties:
      lb_target_groups:
      - ((terraform_outputs.platform_opensearch_lb_target_group))